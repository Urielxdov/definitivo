name: CI

on:
  push:
    branches:
      - '**'

jobs:
  test-backend:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: employes_backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: employes_backend/go.sum

      - name: Download dependencies
        run: go mod download -x

      - name: Run tests
        run: go test -mod=mod ./... -v

  test-frontend:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: employes_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: employes_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --passWithNoTests
